<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우와시스 운영 대시보드</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg: #0a0f1e; --card: #111827; --card2: #1a2235; --border: #1e2d45;
  --accent-a: #00c2ff; --accent-b: #00e5a0; --accent-c: #ff6b6b;
  --text: #e2e8f0; --muted: #64748b; --gold: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; min-height:100vh; padding-bottom:80px; }
#loading-screen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:16px; }
.loading-icon { font-size:48px; animation:spin 1.5s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:var(--muted); font-size:14px; }
.header { background:linear-gradient(135deg,#0d1b2e,#112240); border-bottom:1px solid var(--border); padding:14px 16px 10px; position:sticky; top:0; z-index:1000; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent-a),var(--accent-b)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; }
.logo-text { font-size:16px; font-weight:700; }
.logo-sub { font-size:10px; color:var(--muted); }
.refresh-btn { background:var(--card2); border:1px solid var(--border); color:var(--muted); padding:6px 10px; border-radius:8px; font-size:11px; cursor:pointer; font-family:inherit; }
.date-nav { display:flex; align-items:center; gap:8px; }
.date-nav select { flex:1; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:8px; font-size:13px; font-family:inherit; appearance:none; }
.btn-nav { width:34px; height:34px; background:var(--card2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:12px 16px; }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 10px; text-align:center; }
.kpi-label { font-size:10px; color:var(--muted); margin-bottom:4px; }
.kpi-value { font-size:22px; font-weight:800; line-height:1; }
.kpi-unit { font-size:10px; color:var(--muted); margin-top:2px; }
.kpi-card.blue .kpi-value { color:var(--accent-a); }
.kpi-card.green .kpi-value { color:var(--accent-b); }
.kpi-card.red .kpi-value { color:var(--accent-c); }
.tab-bar { display:flex; gap:6px; padding:0 16px 12px; }
.tab-btn { flex:1; padding:8px 4px; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--muted); font-size:12px; cursor:pointer; font-family:inherit; }
.tab-btn.active { background:var(--accent-a); border-color:var(--accent-a); color:#000; font-weight:700; }
.section { display:none; padding:0 16px; }
.section.active { display:block; }
#map { width:100%; height:400px; border-radius:12px; border:1px solid var(--border); overflow:hidden; }
.map-legend { display:flex; gap:12px; padding:8px 0; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--muted); }
.legend-dot { width:10px; height:10px; border-radius:50%; }
.move-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:8px; }
.move-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.ship-num { font-size:18px; font-weight:800; color:var(--accent-a); }
.team-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
.team-A { background:rgba(0,194,255,0.15); color:var(--accent-a); border:1px solid rgba(0,194,255,0.3); }
.team-B { background:rgba(0,229,160,0.15); color:var(--accent-b); border:1px solid rgba(0,229,160,0.3); }
.team-C { background:rgba(255,107,107,0.15); color:var(--accent-c); border:1px solid rgba(255,107,107,0.3); }
.team-unknown { background:rgba(100,116,139,0.15); color:var(--muted); border:1px solid rgba(100,116,139,0.3); }
.move-route { display:flex; align-items:center; gap:6px; font-size:13px; margin-bottom:6px; }
.loc-from { color:var(--muted); }
.arrow { color:var(--gold); font-size:16px; }
.loc-to { color:var(--text); font-weight:600; }
.move-reason { font-size:11px; color:var(--muted); }
.table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.table-wrap table { width:100%; border-collapse:collapse; font-size:13px; }
.table-wrap thead { background:var(--card2); }
.table-wrap th { padding:10px 12px; text-align:left; font-size:11px; color:var(--muted); font-weight:600; border-bottom:1px solid var(--border); }
.table-wrap td { padding:10px 12px; border-bottom:1px solid rgba(30,45,69,0.5); vertical-align:middle; }
.table-wrap tr:last-child td { border-bottom:none; }
.num { font-weight:700; }
.ice-A { color:var(--accent-a); font-weight:700; }
.ice-B { color:var(--accent-b); font-weight:700; }
.ice-C { color:var(--accent-c); font-weight:700; }
.ice-unknown { color:var(--muted); font-weight:700; }
.contact-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:8px; }
.contact-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.team-title { font-size:15px; font-weight:700; }
.contact-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-top:1px solid var(--border); }
.contact-role { font-size:11px; color:var(--muted); }
.contact-name { font-size:14px; font-weight:600; margin-top:2px; }
.call-btn { display:flex; align-items:center; gap:5px; background:rgba(0,194,255,0.1); border:1px solid rgba(0,194,255,0.3); color:var(--accent-a); padding:7px 12px; border-radius:8px; font-size:12px; font-weight:600; text-decoration:none; }
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
.empty-icon { font-size:32px; margin-bottom:8px; }
.last-updated { font-size:10px; color:var(--muted); text-align:center; padding:8px; }
/* 지도 팝업 커스텀 */
.leaflet-popup-content-wrapper { background:#1a2235; border:1px solid #1e2d45; color:#e2e8f0; border-radius:10px; }
.leaflet-popup-tip { background:#1a2235; }
.map-popup-title { font-size:14px; font-weight:700; margin-bottom:6px; }
.map-popup-team { font-size:11px; margin-bottom:8px; }
.map-popup-total { font-size:22px; font-weight:800; line-height:1; margin-bottom:4px; }
.map-popup-unit { font-size:10px; color:#64748b; margin-bottom:10px; }
.map-popup-ships { border-top:1px solid #1e2d45; padding-top:8px; }
.map-popup-ship-row { display:flex; justify-content:space-between; font-size:12px; padding:2px 0; }
.map-popup-ship-num { color:#94a3b8; }
.map-popup-ship-ice { font-weight:700; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-icon">🧊</div>
  <div class="loading-text">데이터 불러오는 중...</div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">🧊</div>
        <div>
          <div class="logo-text">우와시스</div>
          <div class="logo-sub">야드 물품 공급 운영</div>
        </div>
      </div>
      <button class="refresh-btn" onclick="loadAllData()">↺ 새로고침</button>
    </div>
    <div class="date-nav">
      <button class="btn-nav" id="prev-btn">◀</button>
      <select id="date-select"></select>
      <button class="btn-nav" id="next-btn">▶</button>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card blue"><div class="kpi-label">총 작업인원</div><div class="kpi-value" id="kpi-workers">-</div><div class="kpi-unit">명</div></div>
    <div class="kpi-card green"><div class="kpi-label">필요 얼음물</div><div class="kpi-value" id="kpi-ice">-</div><div class="kpi-unit">개</div></div>
    <div class="kpi-card red"><div class="kpi-label">이동 호선</div><div class="kpi-value" id="kpi-ships">-</div><div class="kpi-unit">건</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('map')">🗺️ 지도</button>
    <button class="tab-btn" onclick="switchTab('move')">🚢 이동</button>
    <button class="tab-btn" onclick="switchTab('ice')">🧊 수량</button>
    <button class="tab-btn" onclick="switchTab('team')">👥 담당자</button>
    <button class="tab-btn" onclick="switchTab('yard')">🏗️ 배치도</button>
  </div>

  <div class="section active" id="sec-map">
    <div id="map"></div>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00c2ff"></div>A팀</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00e5a0"></div>B팀</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>C팀</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>이동예정</div>
    </div>
  </div>

  <div class="section" id="sec-move"><div id="move-list"></div></div>

  <div class="section" id="sec-ice">
    <div class="table-wrap">
      <table>
        <thead><tr><th>호선</th><th>팀</th><th>얼음물</th></tr></thead>
        <tbody id="ice-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="section" id="sec-team"><div id="team-list"></div></div>
  <div class="section" id="sec-yard">
    <div id="yard-container" style="position:relative;width:100%;border-radius:12px;overflow:hidden;border:1px solid var(--border)">
      <img id="yard-bg" style="width:100%;display:block;opacity:0.7" />
      <canvas id="yard-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%"></canvas>
    </div>
  </div>
  <div class="last-updated" id="last-updated"></div>
</div>

<script>
const SHEET_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQBff75LSjUiUEc-JK1yQ-gqMYdNsTDDsbwoKGKtcZgmq0gdDle-UkqF5RuBccGmZPsWQZDe0Ut9wet/pub?single=true&output=csv';
const URLS = {
  workforce: SHEET_BASE + '&gid=0',
  movement:  SHEET_BASE + '&gid=1794460912',
  contacts:  SHEET_BASE + '&gid=1401593939',
  locations: SHEET_BASE + '&gid=663859698',
};
const TEAM_COLOR = { A:'#00c2ff', B:'#00e5a0', C:'#ff6b6b' };

// ── 위치별 그룹 번호 (1단계 위치명 → 2단계 그룹 번호) ──
const LOC_GROUP = {
  'No.2 Dock': 1,
  'No.1 Dock': 1,
  'No.1 Berth': 2,
  'N-B-2': 3,
  'N-B-1': 3,
  'N-A-2': 4,
  'N-A-1': 4,
  'F-B-1': 5,
  'F-B-2': 5,
  'F-A-1': 6,
  'F-A-2': 6,
  'F/Dock': 6,
  'D-B-2': 7,
  'D-B-1': 7,
  'D-A-2': 8,
  'D-A-1': 8,
  '2-B-2': 9,
  '2-B-1': 9,
  '2-A-2': 10,
  '2-A-1': 10,
  '1-B-2': 11,
  '1-B-1': 11,
  '1-A-2': 12,
  '1-A-1': 12,
  '지원관': 13,
};

let WORKFORCE=[], MOVEMENT=[], CONTACTS=[], LOCATIONS=[];
let selectedDate='', allDates=[];
let map, markersLayer, routeLayer, bubbleLayer;
let currentZoom = 14;

// ── 이동 판정: 전날 대비 이동후위치가 바뀐 경우만 이동으로 간주 ──
function getMovesForDate(date) {
  const todayRows = MOVEMENT.filter(m => String(m['날짜']).trim() === date);
  return todayRows.filter(mv => {
    const shipStr = String(mv['호선']).trim();
    const todayDest = (mv['이동후위치'] || '').trim();
    if (!todayDest) return false;
    const shipRows = MOVEMENT
      .filter(m => String(m['호선']).trim() === shipStr)
      .sort((a, b) => String(a['날짜']).localeCompare(String(b['날짜'])));
    const prevRow = [...shipRows].reverse().find(m => String(m['날짜']).trim() < date);
    if (!prevRow) return true;
    const prevDest = (prevRow['이동후위치'] || '').trim();
    return todayDest !== prevDest;
  });
}

// ── 호선+날짜 → 현재 위치 조회 ──
function getCurrentLocation(shipNo, date) {
  const shipStr = String(shipNo).trim();
  const candidates = MOVEMENT
    .filter(m => String(m['호선']).trim() === shipStr && String(m['날짜']).trim() <= date)
    .sort((a, b) => String(b['날짜']).localeCompare(String(a['날짜'])));
  return candidates.length ? (candidates[0]['이동후위치'] || '').trim() : null;
}

// ── 호선+날짜 → 팀 조회 ──
function getTeamForShip(shipNo, date) {
  const destination = getCurrentLocation(shipNo, date);
  if (!destination) return null;
  const loc = LOCATIONS.find(l => (l['위치'] || '').trim() === destination);
  return loc ? (loc['팀'] || '').trim() || null : null;
}

// ── 위치별 얼음물 집계: { 위치명: { team, total, ships:[{호선,수량}] } } ──
function getIceByLocation(date) {
  const result = {};
  const wf = WORKFORCE.filter(w => String(w['날짜']).trim() === date);
  wf.forEach(r => {
    const team = (r['담당팀']||'').trim() || getTeamForShip(r['호선'], date) || '';
    if (!team) return;
    const loc = getCurrentLocation(r['호선'], date);
    if (!loc) return;
    if (!result[loc]) result[loc] = { team, total:0, ships:[] };
    const n = parseInt(r['작업인원']||0);
    result[loc].total += n;
    result[loc].ships.push({ ship: r['호선'], ice: n });
  });
  return result;
}

// CSV 파싱
function parseCSV(text) {
  const rows = [];
  const lines = text.trim().split('\n');
  const headers = splitCSVLine(lines[0]);
  for (let i=1; i<lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    if (!vals.some(v=>v)) continue;
    const obj = {};
    headers.forEach((h,idx) => { obj[h] = (vals[idx]||'').trim(); });
    rows.push(obj);
  }
  return rows;
}

function splitCSVLine(line) {
  const result=[], re=/("(?:[^"]|"")*"|[^,]*)(,|$)/g;
  let m;
  while ((m=re.exec(line)) !== null) {
    let val = m[1];
    if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1,-1).replace(/""/g,'"');
    result.push(val.trim());
    if (m[2]==='') break;
  }
  return result;
}

async function fetchCSV(url) {
  const res = await fetch(url + '&cachebust=' + Date.now());
  const text = await res.text();
  return parseCSV(text);
}

async function loadAllData() {
  document.getElementById('loading-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  try {
    [WORKFORCE, MOVEMENT, CONTACTS, LOCATIONS] = await Promise.all([
      fetchCSV(URLS.workforce), fetchCSV(URLS.movement),
      fetchCSV(URLS.contacts),  fetchCSV(URLS.locations),
    ]);
    const dates = [...new Set(WORKFORCE.map(r=>r['날짜']).filter(Boolean))].sort();
    allDates = dates;
    if (!selectedDate || !allDates.includes(selectedDate)) {
      const today = new Date().toISOString().slice(0,10);
      selectedDate = allDates.find(d=>d>=today) || allDates[allDates.length-1] || '';
    }
    initDateSelect();
    render();
    document.getElementById('last-updated').textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
    document.getElementById('loading-screen').style.display='none';
    document.getElementById('app').style.display='block';
    if (!map) initMap();
    setTimeout(()=>map&&map.invalidateSize(),200);
  } catch(e) {
    document.getElementById('loading-screen').innerHTML=`
      <div style="text-align:center;padding:20px">
        <div style="font-size:40px">⚠️</div>
        <div style="margin-top:12px;font-size:14px;color:#ff6b6b">데이터 로드 실패</div>
        <div style="margin-top:6px;font-size:12px;color:#64748b">구글 시트 게시 설정을 확인해주세요</div>
        <button onclick="loadAllData()" style="margin-top:16px;padding:8px 20px;background:#00c2ff;border:none;border-radius:8px;font-size:13px;cursor:pointer">다시 시도</button>
      </div>`;
  }
}

function initDateSelect() {
  const sel = document.getElementById('date-select');
  sel.innerHTML='';
  const days=['일','월','화','수','목','금','토'];
  allDates.forEach(d=>{
    const opt=document.createElement('option');
    opt.value=d;
    const dt=new Date(d+'T00:00:00');
    opt.textContent=`${d.slice(5).replace('-','/')} (${days[dt.getDay()]})`;
    if(d===selectedDate) opt.selected=true;
    sel.appendChild(opt);
  });
  sel.onchange=e=>{ selectedDate=e.target.value; render(); };
  document.getElementById('prev-btn').onclick=()=>{
    const i=allDates.indexOf(selectedDate);
    if(i>0){ selectedDate=allDates[i-1]; sel.value=selectedDate; render(); }
  };
  document.getElementById('next-btn').onclick=()=>{
    const i=allDates.indexOf(selectedDate);
    if(i<allDates.length-1){ selectedDate=allDates[i+1]; sel.value=selectedDate; render(); }
  };
}

function initMap() {
  map = L.map('map',{zoomControl:false}).setView([34.737,126.372],14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
  routeLayer   = L.layerGroup().addTo(map);
  bubbleLayer  = L.layerGroup().addTo(map);

  map.on('zoomend', () => {
    currentZoom = map.getZoom();
    updateMapBubbles();
  });
}

function updateMap() {
  if(!map) return;
  markersLayer.clearLayers();
  routeLayer.clearLayers();

  const locMap={};
  LOCATIONS.forEach(l=>{ if(l['위치']) locMap[l['위치']]=l; });

  // 위치 점 마커 (모든 위치)
  LOCATIONS.forEach(loc=>{
    const lat=parseFloat(loc['위도']), lng=parseFloat(loc['경도']);
    if(!lat||!lng) return;
    const color=TEAM_COLOR[loc['팀']]||'#64748b';
    L.circleMarker([lat,lng],{radius:5,fillColor:color,color:'#fff',weight:1.5,fillOpacity:0.7})
      .addTo(markersLayer);
    L.marker([lat,lng],{
      icon:L.divIcon({
        className:'',
        html:`<div style="font-size:9px;color:#fff;background:rgba(0,0,0,0.6);padding:1px 4px;border-radius:3px;white-space:nowrap;transform:translate(-50%,-22px)">${loc['위치']}</div>`,
        iconAnchor:[0,0]
      }),
      interactive:false
    }).addTo(markersLayer);
  });

  // 이동 경로 화살표
  getMovesForDate(selectedDate).forEach(mv=>{
    const shipStr = String(mv['호선']).trim();
    const shipRows = MOVEMENT
      .filter(r => String(r['호선']).trim() === shipStr)
      .sort((a, b) => String(a['날짜']).localeCompare(String(b['날짜'])));
    const prevRow = [...shipRows].reverse().find(r => String(r['날짜']).trim() < selectedDate);
    const fromName = prevRow ? (prevRow['이동후위치']||'').trim() : '';
    const toName = (mv['이동후위치']||'').trim();
    const from=locMap[fromName], to=locMap[toName];
    if(!from||!to) return;
    const fLat=parseFloat(from['위도']),fLng=parseFloat(from['경도']);
    const tLat=parseFloat(to['위도']),tLng=parseFloat(to['경도']);
    if(!fLat||!tLat) return;
    L.polyline([[fLat,fLng],[tLat,tLng]],{color:'#f59e0b',weight:3,dashArray:'8,6'})
      .bindPopup(`<b>${mv['호선']}호선</b><br>${fromName} → ${toName}`)
      .addTo(routeLayer);
    L.circleMarker([tLat,tLng],{radius:8,fillColor:'#f59e0b',color:'#fff',weight:2,fillOpacity:0.9})
      .addTo(routeLayer);
  });

  updateMapBubbles();
}

// ── 줌 3단계: 팀버블 / 그룹별 / 위치별 ──
function updateMapBubbles() {
  if(!map) return;
  bubbleLayer.clearLayers();

  const locMap={};
  LOCATIONS.forEach(l=>{ if(l['위치']) locMap[l['위치']]=l; });

  const iceByLoc = getIceByLocation(selectedDate);
  const zoom = map.getZoom();

  if (zoom < 14) {
    // ── 1단계 (줌 < 14): 팀별 버블 ──
    const teamTotals = {
      A:{total:0,lats:[],lngs:[]},
      B:{total:0,lats:[],lngs:[]},
      C:{total:0,lats:[],lngs:[]}
    };

    Object.entries(iceByLoc).forEach(([locName, data]) => {
      const locInfo = locMap[locName];
      if(!locInfo) return;
      const lat=parseFloat(locInfo['위도']), lng=parseFloat(locInfo['경도']);
      if(!lat||!lng||!teamTotals[data.team]) return;
      teamTotals[data.team].total += data.total;
      teamTotals[data.team].lats.push(lat);
      teamTotals[data.team].lngs.push(lng);
    });

    Object.entries(teamTotals).forEach(([team, data]) => {
      if(!data.total || !data.lats.length) return;
      const avgLat = data.lats.reduce((s,v)=>s+v,0)/data.lats.length;
      const avgLng = data.lngs.reduce((s,v)=>s+v,0)/data.lngs.length;
      const color = TEAM_COLOR[team];
      const r = Math.max(32, Math.min(65, 18 + data.total / 8));

      L.circleMarker([avgLat,avgLng],{
        radius: r,
        fillColor: color,
        color: color,
        weight: 2,
        fillOpacity: 0.22
      }).addTo(bubbleLayer);

      L.marker([avgLat,avgLng],{
        icon: L.divIcon({
          className:'',
          html:`<div style="
            color:#fff;font-weight:800;text-align:center;
            text-shadow:0 2px 6px rgba(0,0,0,0.9);
            transform:translate(-50%,-50%);
            pointer-events:none;
          ">
            <div style="font-size:28px;line-height:1">${data.total}</div>
            <div style="font-size:11px;opacity:0.85">${team}팀</div>
          </div>`,
          iconAnchor:[0,0]
        }),
        interactive:false
      }).addTo(bubbleLayer);
    });

  } else if (zoom < 16) {
    // ── 2단계 (14 ≤ 줌 < 16): 그룹별 버블 (LOC_GROUP 기준 묶음) ──
    const groupData = {};

    Object.entries(iceByLoc).forEach(([locName, data]) => {
      const locInfo = locMap[locName];
      if(!locInfo) return;
      const lat=parseFloat(locInfo['위도']), lng=parseFloat(locInfo['경도']);
      if(!lat||!lng) return;
      const grp = LOC_GROUP[locName];
      if(grp === undefined) return;
      if(!groupData[grp]) groupData[grp] = {total:0, teamCounts:{}, lats:[], lngs:[], locs:[]};
      groupData[grp].total += data.total;
      groupData[grp].teamCounts[data.team] = (groupData[grp].teamCounts[data.team]||0) + data.total;
      groupData[grp].lats.push(lat);
      groupData[grp].lngs.push(lng);
      groupData[grp].locs.push({ name: locName, ...data });
    });

    Object.entries(groupData).forEach(([grp, data]) => {
      if(!data.total) return;
      const avgLat = data.lats.reduce((s,v)=>s+v,0)/data.lats.length;
      const avgLng = data.lngs.reduce((s,v)=>s+v,0)/data.lngs.length;

      // 그룹 내 가장 많은 팀을 대표 색상으로
      const dominantTeam = Object.entries(data.teamCounts)
        .sort((a,b)=>b[1]-a[1])[0]?.[0] || 'A';
      const color = TEAM_COLOR[dominantTeam] || '#64748b';
      const r = Math.max(22, Math.min(50, 12 + data.total / 8));

      L.circleMarker([avgLat,avgLng],{
        radius: r,
        fillColor: color,
        color: color,
        weight: 2,
        fillOpacity: 0.28
      }).addTo(bubbleLayer);

      // 팝업: 그룹 내 위치별 상세
      const locsHtml = data.locs
        .sort((a,b)=>b.total-a.total)
        .map(l=>`<div class="map-popup-ship-row">
          <span class="map-popup-ship-num">${l.name}</span>
          <span class="map-popup-ship-ice" style="color:${TEAM_COLOR[l.team]||color}">${l.total}개</span>
        </div>`).join('');

      const marker = L.marker([avgLat,avgLng],{
        icon: L.divIcon({
          className:'',
          html:`<div style="
            color:#fff;font-weight:800;text-align:center;
            text-shadow:0 2px 6px rgba(0,0,0,0.9);
            transform:translate(-50%,-50%);
            cursor:pointer;
          ">
            <div style="font-size:20px;line-height:1">${data.total}</div>
          </div>`,
          iconAnchor:[0,0]
        })
      });

      marker.bindPopup(`
        <div style="min-width:160px">
          <div class="map-popup-title">구역 ${grp}</div>
          <div class="map-popup-total" style="color:${color}">${data.total}</div>
          <div class="map-popup-unit">개 (얼음물)</div>
          <div class="map-popup-ships">${locsHtml}</div>
        </div>
      `, {maxWidth:230});

      marker.addTo(bubbleLayer);
    });

  } else {
    // ── 3단계 (줌 ≥ 16): 위치별 개별 배지 + 클릭 팝업 ──
    Object.entries(iceByLoc).forEach(([locName, data]) => {
      const locInfo = locMap[locName];
      if(!locInfo) return;
      const lat=parseFloat(locInfo['위도']), lng=parseFloat(locInfo['경도']);
      if(!lat||!lng) return;
      const color = TEAM_COLOR[data.team] || '#64748b';

      const shipsHtml = data.ships
        .sort((a,b)=>b.ice-a.ice)
        .map(s=>`<div class="map-popup-ship-row">
          <span class="map-popup-ship-num">${s.ship}호선</span>
          <span class="map-popup-ship-ice" style="color:${color}">${s.ice}개</span>
        </div>`).join('');

      const marker = L.marker([lat,lng],{
        icon: L.divIcon({
          className:'',
          html:`<div style="
            background:${color};color:#000;font-weight:800;
            border-radius:20px;padding:3px 9px;font-size:13px;
            border:2px solid rgba(255,255,255,0.5);
            box-shadow:0 2px 8px rgba(0,0,0,0.4);
            white-space:nowrap;transform:translate(-50%,-50%);
            cursor:pointer;
          ">${data.total}</div>`,
          iconAnchor:[0,0]
        })
      });

      marker.bindPopup(`
        <div style="min-width:150px">
          <div class="map-popup-title">${locName}</div>
          <div class="map-popup-team" style="color:${color}">${data.team}팀</div>
          <div class="map-popup-total" style="color:${color}">${data.total}</div>
          <div class="map-popup-unit">개 (얼음물)</div>
          <div class="map-popup-ships">${shipsHtml}</div>
        </div>
      `, {maxWidth:220});

      marker.addTo(bubbleLayer);
    });
  }
}

function updateMoveList() {
  const el=document.getElementById('move-list');
  const moves=getMovesForDate(selectedDate);
  if(!moves.length){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">🚢</div>이날 이동 계획이 없습니다</div>`; return; }
  el.innerHTML=moves.map(m=>{
    const shipStr = String(m['호선']).trim();
    const team = (m['담당팀']||'').trim() || getTeamForShip(shipStr, selectedDate) || '';
    const badgeClass = team ? `team-${team}` : 'team-unknown';
    const badgeLabel = team ? `${team}팀` : '-';
    const shipRows = MOVEMENT
      .filter(r => String(r['호선']).trim() === shipStr)
      .sort((a, b) => String(a['날짜']).localeCompare(String(b['날짜'])));
    const prevRow = [...shipRows].reverse().find(r => String(r['날짜']).trim() < selectedDate);
    const fromLoc = prevRow ? (prevRow['이동후위치']||'').trim() : '-';
    const toLoc = (m['이동후위치']||'').trim() || '-';
    return `
    <div class="move-card">
      <div class="move-header">
        <div class="ship-num">${m['호선']}호선</div>
        <div class="team-badge ${badgeClass}">${badgeLabel}</div>
      </div>
      <div class="move-route">
        <span class="loc-from">${fromLoc}</span>
        <span class="arrow">→</span>
        <span class="loc-to">${toLoc}</span>
      </div>
      <div class="move-reason">${m['비고']||''}</div>
    </div>`;
  }).join('');
}

function updateIceTable() {
  const tbody=document.getElementById('ice-tbody');
  const rows=WORKFORCE.filter(w=>w['날짜']===selectedDate)
    .sort((a,b)=>parseInt(b['작업인원']||0)-parseInt(a['작업인원']||0));

  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="3" style="text-align:center;color:#64748b;padding:30px">데이터 없음</td></tr>`;
    return;
  }

  const filtered = rows.filter(r => {
    const team = (r['담당팀']||'').trim() || getTeamForShip(r['호선'], r['날짜']) || '';
    return !!team;
  });

  if(!filtered.length){
    tbody.innerHTML=`<tr><td colspan="3" style="text-align:center;color:#64748b;padding:30px">팀 배정된 호선 없음</td></tr>`;
    return;
  }

  tbody.innerHTML=filtered.map(r=>{
    const n = parseInt(r['작업인원']||0);
    const team = (r['담당팀']||'').trim() || getTeamForShip(r['호선'], r['날짜']) || '';
    const badgeClass = `team-${team}`;
    const iceClass   = `ice-${team}`;
    return `<tr>
      <td class="num">${r['호선']}</td>
      <td><span class="team-badge ${badgeClass}" style="font-size:10px;padding:2px 7px">${team}팀</span></td>
      <td class="${iceClass}">${n.toLocaleString()}</td>
    </tr>`;
  }).join('');
}

function updateKPI() {
  const wf=WORKFORCE.filter(w=>w['날짜']===selectedDate);
  const totalWorkers=wf.reduce((s,r)=>s+parseInt(r['작업인원']||0),0);
  const totalIce=wf.reduce((s,r)=>{
    const team=(r['담당팀']||'').trim()||getTeamForShip(r['호선'],r['날짜'])||'';
    return team ? s+parseInt(r['작업인원']||0) : s;
  },0);
  const moves=getMovesForDate(selectedDate).length;
  document.getElementById('kpi-workers').textContent=totalWorkers.toLocaleString();
  document.getElementById('kpi-ice').textContent=totalIce.toLocaleString();
  document.getElementById('kpi-ships').textContent=moves;
}

function updateTeam() {
  const el=document.getElementById('team-list');
  if(!CONTACTS.length){ el.innerHTML=`<div class="empty-state"><div class="empty-icon">👥</div>담당자 정보가 없습니다</div>`; return; }
  el.innerHTML=['A','B','C'].map(team=>{
    const members=CONTACTS.filter(c=>c['팀']===team);
    if(!members.length) return '';
    return `<div class="contact-card">
      <div class="contact-header">
        <div class="team-title" style="color:${TEAM_COLOR[team]}">${team}팀</div>
        <div class="team-badge team-${team}">${team}팀</div>
      </div>
      ${members.map(m=>`
      <div class="contact-row">
        <div><div class="contact-role">${m['역할']||''}</div><div class="contact-name">${m['이름']||''}</div></div>
        <a class="call-btn" href="tel:${m['연락처']||''}">📞 ${m['연락처']||'-'}</a>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{
    btn.classList.toggle('active',['map','move','ice','team','yard'][i]===tab);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  if(tab==='map') setTimeout(()=>map&&map.invalidateSize(),100);
  if(tab==='yard') setTimeout(()=>renderYard(),100);
}

function renderYard() {
  const container = document.getElementById('yard-container');
  const canvas = document.getElementById('yard-canvas');
  const img = document.getElementById('yard-bg');

  // 배경 이미지 설정
  img.src = YARD_IMG_B64;
  img.onload = () => {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.style.width  = '100%';
    canvas.style.height = '100%';
    drawYard(canvas);
  };
  if(img.complete && img.naturalWidth) {
    canvas.width  = img.naturalWidth;
    canvas.height = img.naturalHeight;
    drawYard(canvas);
  }
}

function drawYard(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  const iceByLoc = getIceByLocation(selectedDate);

  Object.entries(YARD_LOCS).forEach(([locName, pos]) => {
    const data = iceByLoc[locName];
    const color = data ? (TEAM_COLOR[data.team] || '#64748b') : 'rgba(100,116,139,0.3)';
    const x = pos.x/100 * W;
    const y = pos.y/100 * H;
    const w = pos.w/100 * W;
    const h = pos.h/100 * H;

    ctx.save();
    ctx.translate(x + w/2, y + h/2);

    // 선박 타원 or 도크 사각형
    const isHoriz = pos.w > pos.h;
    if(isHoriz) {
      // 가로형 선박 (안벽)
      ctx.beginPath();
      ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI*2);
    } else {
      // 세로형 선박 (도크/돌핀)
      ctx.beginPath();
      ctx.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI*2);
    }

    if(data) {
      ctx.fillStyle = color + '99';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();

      // 얼음물 수량 텍스트
      const fontSize = Math.max(10, Math.min(w, h) * 0.35);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${fontSize}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(data.total, 0, 0);
    } else {
      ctx.fillStyle = 'rgba(30,45,69,0.4)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(100,116,139,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.restore();
  });
}

function render() { updateKPI(); updateMap(); updateMoveList(); updateIceTable(); updateTeam(); }
